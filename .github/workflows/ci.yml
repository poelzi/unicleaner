name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nix-ci:
    name: Nix Build & Check (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
          - system: aarch64-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: unicleaner
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Check flake
        run: nix flake check --show-trace

      - name: Build unicleaner
        run: nix build .#unicleaner --print-build-logs

      - name: Run tests
        run: nix build .#checks.${{ matrix.system }}.test --print-build-logs

      - name: Run clippy
        run: nix build .#checks.${{ matrix.system }}.clippy --print-build-logs

      - name: Check formatting
        run: nix build .#checks.${{ matrix.system }}.fmt --print-build-logs

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: unicleaner
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Generate coverage
        run: |
          nix develop --command cargo tarpaulin \
            --out Xml \
            --out Html \
            --output-dir coverage \
            --exclude-files 'fuzz/*' \
            --all-features \
            --workspace \
            --timeout 300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN || secrets.CODECOV_ORG_TOKEN }}
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  fuzz:
    name: Fuzz Testing (Quick)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz-unicode
          - fuzz-config
          - fuzz-git-integration
          - fuzz-unicode-ranges
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: unicleaner
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Run fuzzer (30s quick check)
        run: |
          nix run .#${{ matrix.target }} -- -max_total_time=30 -timeout=10
        continue-on-error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  nightly-breakage:
    name: Nightly Rust Breakage Detection
    runs-on: ubuntu-latest
    continue-on-error: true # Don't fail CI if nightly breaks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: nightly-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: nightly-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: nightly-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with nightly
        run: cargo +nightly build --all-features
        continue-on-error: true

      - name: Test with nightly
        run: cargo +nightly test --all-features
        continue-on-error: true

      - name: Clippy with nightly
        run: cargo +nightly clippy --all-targets --all-features
        continue-on-error: true
