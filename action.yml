name: "Unicleaner Unicode Security Check"
description: "Scan repositories for malicious Unicode characters"
author: "Unicleaner Contributors"
branding:
  icon: "shield"
  color: "blue"

inputs:
  version:
    description: "Release tag to download (for example: v1.2.3). Use 'latest' to resolve the latest GitHub release."
    required: false
    default: "latest"
  mode:
    description: "Scan mode: 'diff' for changed files only, 'full' for the provided path."
    required: false
    default: "diff"
  path:
    description: "Path to scan in full mode."
    required: false
    default: "."
  base-ref:
    description: "Base branch used in diff mode when GITHUB_BASE_REF is not available."
    required: false
    default: "main"
  config:
    description: "Optional path to unicleaner config file."
    required: false
    default: ""
  severity:
    description: "Optional minimum severity filter passed to --severity."
    required: false
    default: ""
  fail-on-violations:
    description: "Fail the action when violations are found."
    required: false
    default: "true"
  output-file:
    description: "Path of the JSON report generated by this action."
    required: false
    default: "unicleaner-results.json"

outputs:
  violation_count:
    description: "Number of violations found"
    value: ${{ steps.scan.outputs.violation_count }}
  files_scanned:
    description: "Number of files scanned"
    value: ${{ steps.scan.outputs.files_scanned }}
  output_file:
    description: "Path to the JSON report file"
    value: ${{ steps.scan.outputs.output_file }}

runs:
  using: "composite"
  steps:
    - name: Install unicleaner binary
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${RUNNER_OS}" != "Linux" || "${RUNNER_ARCH}" != "X64" ]]; then
          echo "::error::This action currently supports ubuntu-latest (Linux x64) runners only."
          exit 2
        fi

        if ! command -v curl >/dev/null 2>&1; then
          echo "::error::curl is required but not available on this runner"
          exit 2
        fi

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required but not available on this runner"
          exit 2
        fi

        version="${{ inputs.version }}"
        if [[ "$version" == "latest" ]]; then
          version="$(curl -fsSL https://api.github.com/repos/poelzi/unicleaner/releases/latest | jq -r '.tag_name')"
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::Failed to resolve latest release tag from GitHub API"
            exit 2
          fi
        fi

        if [[ "$version" != v* ]]; then
          version="v${version}"
        fi

        archive_version="${version#v}"
        archive_name="unicleaner-${archive_version}-linux-x86_64-musl.tar.gz"
        archive_url="https://github.com/poelzi/unicleaner/releases/download/${version}/${archive_name}"

        install_dir="$RUNNER_TEMP/unicleaner-bin"
        mkdir -p "$install_dir"

        echo "Downloading $archive_url"
        curl -fsSL "$archive_url" -o "$RUNNER_TEMP/unicleaner.tar.gz"
        tar -xzf "$RUNNER_TEMP/unicleaner.tar.gz" -C "$install_dir"
        chmod +x "$install_dir/unicleaner"
        echo "$install_dir" >> "$GITHUB_PATH"

    - name: Run unicleaner scan
      id: scan
      shell: bash
      run: |
        set -euo pipefail

        mode="${{ inputs.mode }}"
        scan_path="${{ inputs.path }}"
        base_ref="${GITHUB_BASE_REF:-${{ inputs.base-ref }}}"
        config_path="${{ inputs.config }}"
        severity="${{ inputs.severity }}"
        fail_on_violations="${{ inputs.fail-on-violations }}"
        output_file="${{ inputs.output-file }}"

        mkdir -p "$(dirname "$output_file")"

        scan_args=(scan --format json --no-color)
        if [[ -n "$config_path" ]]; then
          scan_args+=(--config "$config_path")
        fi
        if [[ -n "$severity" ]]; then
          scan_args+=(--severity "$severity")
        fi

        scan_exit=0
        if [[ "$mode" == "diff" ]]; then
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "::error::mode=diff requires a git repository"
            exit 2
          fi

          git fetch --no-tags --depth=1 origin "$base_ref"

          mapfile -t changed_files < <(git diff --name-only "origin/${base_ref}...HEAD")
          existing_files=()
          for file in "${changed_files[@]}"; do
            if [[ -f "$file" ]]; then
              existing_files+=("$file")
            fi
          done

          if [[ ${#existing_files[@]} -eq 0 ]]; then
            printf '{"violations":[],"files_scanned":0,"errors":[]}' > "$output_file"
          else
            set +e
            unicleaner "${scan_args[@]}" "${existing_files[@]}" > "$output_file"
            scan_exit=$?
            set -e
          fi
        elif [[ "$mode" == "full" ]]; then
          set +e
          unicleaner "${scan_args[@]}" "$scan_path" > "$output_file"
          scan_exit=$?
          set -e
        else
          echo "::error::Invalid mode '$mode'. Expected 'diff' or 'full'."
          exit 2
        fi

        if [[ "$scan_exit" -gt 1 ]]; then
          echo "::error::unicleaner failed with exit code $scan_exit"
          exit "$scan_exit"
        fi

        violation_count="$(jq '.violations | length' "$output_file")"
        files_scanned="$(jq '.files_scanned // 0' "$output_file")"

        echo "violation_count=$violation_count" >> "$GITHUB_OUTPUT"
        echo "files_scanned=$files_scanned" >> "$GITHUB_OUTPUT"
        echo "output_file=$output_file" >> "$GITHUB_OUTPUT"

        {
          echo "### Unicode Security Check"
          echo ""
          echo "- Mode: \`$mode\`"
          echo "- Files scanned: $files_scanned"
          echo "- Violations: $violation_count"
          echo "- Report: \`$output_file\`"
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "$fail_on_violations" == "true" && "$violation_count" -gt 0 ]]; then
          echo "::error::Found $violation_count Unicode violation(s)"
          exit 1
        fi
