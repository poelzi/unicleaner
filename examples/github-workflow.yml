# Minimal GitHub Actions setup using the public Unicleaner check.

name: Unicode Security Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unicode-security:
    name: Unicode security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Option A: Use the action directly.
      - name: Scan changed files
        uses: poelzi/unicleaner@v1
        with:
          mode: diff
          base-ref: main
          fail-on-violations: true

      # Option B: Use the reusable workflow instead of steps above:
      # uses: poelzi/unicleaner/.github/workflows/unicode-check.yml@v1
      # with:
      #   mode: diff
      #   base-ref: main
      #   fail-on-violations: true
