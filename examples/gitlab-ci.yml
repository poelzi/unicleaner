# GitLab CI configuration for Unicleaner
# Scans for malicious Unicode characters in merge requests

# Define stages
stages:
  - security
  - test

# Variables
variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUST_VERSION: "stable"

# Cache Rust dependencies
.rust_cache:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - target/

# Unicode security scan job
unicode-security-scan:
  stage: security
  image: rust:latest
  extends: .rust_cache

  before_script:
    - rustc --version
    - cargo --version
    - cargo install --git https://github.com/poelzi/unicleaner || echo "Using cached unicleaner"

  script:
    # Scan only changed files in merge requests
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        echo "Scanning changed files in merge request..."
        unicleaner scan --diff --verbose
      else
        echo "Scanning entire repository..."
        unicleaner scan . --verbose
      fi

  # Allow manual retry if scan fails
  retry:
    max: 1
    when: script_failure

  # Report results
  artifacts:
    name: "unicode-scan-$CI_COMMIT_SHORT_SHA"
    paths:
      - unicode-scan-results.json
    reports:
      # GitLab can display JSON reports
      codequality: unicode-scan-results.json
    when: always
    expire_in: 30 days

  # Only run on merge requests and main branch
  only:
    - merge_requests
    - main
    - master
    - develop

# Alternative: Scan with custom configuration
unicode-scan-custom-config:
  stage: security
  image: rust:latest
  extends: .rust_cache

  before_script:
    - cargo install --git https://github.com/poelzi/unicleaner

  script:
    # Create custom configuration
    - |
      cat > unicleaner.toml << 'EOF'
      deny_by_default = true

      [language_presets]
      rust = "rust"
      python = "python"
      javascript = "javascript"

      [[file_rules]]
      pattern = "**/*.rs"
      priority = 1

      [[file_rules]]
      pattern = "**/*.py"
      priority = 1
      EOF

    # Scan with config
    - unicleaner scan --config unicleaner.toml --diff --verbose --format json > unicode-scan-results.json

  artifacts:
    paths:
      - unicode-scan-results.json
    when: always
    expire_in: 7 days

  # Run only on merge requests
  only:
    - merge_requests

# Example: Scan and block merge if violations found
unicode-scan-blocking:
  stage: test
  image: rust:latest
  extends: .rust_cache

  before_script:
    - cargo install --git https://github.com/poelzi/unicleaner

  script:
    - |
      set +e  # Don't exit on error
      unicleaner scan --diff --verbose
      EXIT_CODE=$?

      if [ $EXIT_CODE -eq 0 ]; then
        echo "✅ No malicious Unicode detected"
        exit 0
      elif [ $EXIT_CODE -eq 1 ]; then
        echo "❌ BLOCKING: Malicious Unicode characters detected!"
        echo "Please remove the detected characters before merging."
        exit 1
      else
        echo "⚠️  Scanner error occurred"
        exit 2
      fi

  # This job will fail the pipeline if violations are found
  allow_failure: false

  only:
    - merge_requests
# Exit codes:
# 0 = No violations found (clean)
# 1 = Violations found (malicious Unicode detected) - BLOCKS MERGE
# 2 = Error occurred (invalid config, not a git repo, etc.)
